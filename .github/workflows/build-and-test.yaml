name: Build and test

on:
  workflow_dispatch:

  workflow_call:
    inputs:
      upload-artifacts:
        description: "Whether to upload build artifacts for publishing"
        required: false
        default: false
        type: boolean

    secrets:
      READER_TOKEN:
        required: true

    outputs:
      pdfium-hash:
        description: "The hash of the PDFium WASM file"
        value: ${{ jobs.build-and-test.outputs.pdfium-hash }}
      tesseract-version:
        description: "The installed tesseract.js version"
        value: ${{ jobs.build-and-test.outputs.tesseract-version }}

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      # Faster than installing browser and OS dependencies every time. Even with caching of the browser binaries.
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    outputs:
      pdfium-hash: ${{ steps.pdfium-hash.outputs.hash }}
      tesseract-version: ${{ steps.tesseract-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install unzip
        # The Playwright Docker image doesn't include unzip, which setup-bun requires
        run: apt-get update && apt-get install -y unzip

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          registries: |
            https://registry.npmjs.org/
            @navikt:https://npm.pkg.github.com|$TOKEN

      # Continue on failure to collect all errors.
      # failure() is used explicitly to avoid running on cancellation.
      - name: Install dependencies
        if: success() || failure()
        env:
          TOKEN: ${{ secrets.READER_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Compute PDFium WASM hash
        if: success() || failure()
        id: pdfium-hash
        run: echo "hash=$(sha256sum node_modules/@embedpdf/pdfium/dist/pdfium.wasm | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Read Tesseract.js version
        if: success() || failure()
        id: tesseract-version
        run: echo "version=$(node -e "console.log(require('tesseract.js/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Typecheck
        if: success() || failure()
        run: bun typecheck

      - name: Lint
        if: success() || failure()
        run: bun lint

      - name: Knip
        if: success() || failure()
        run: bun knip

      - name: Build package
        if: success() || failure()
        env:
          PDFIUM_WASM_HASH: ${{ steps.pdfium-hash.outputs.hash }}
          TESSERACT_CDN_URL: https://cdn.nav.no/klage/klage-file-viewer/tesseract/v${{ steps.tesseract-version.outputs.version }}
        run: bun run build

      - name: Run unit tests
        if: success() || failure()
        run: bun test

      - name: Run E2E tests
        if: success() || failure()
        run: bun e2e

      - name: Upload build artifacts
        if: inputs.upload-artifacts && success()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          retention-days: 1
          path: |
            dist/
            package.json
            node_modules/@embedpdf/pdfium/dist/pdfium.wasm
            node_modules/tesseract.js/dist/worker.min.js
            node_modules/tesseract.js-core/tesseract-core*.wasm.js
